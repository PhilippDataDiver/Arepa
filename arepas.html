<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>La Vaca y las Arepas Muy Gorditas</title>
<style>
  :root{ --ink:#241a16; --paper:#fff7ec; --sun:#ffd23f; --coral:#ff5d8f; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  html,body{height:100%;overflow:hidden;background:#140f0c;
    font-family:"Chalkboard SE","Comic Sans MS",-apple-system,system-ui,"Segoe UI",sans-serif;color:var(--ink)}
  body{display:flex;align-items:center;justify-content:center}
  #wrap{position:relative;background:#000;border-radius:14px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.6)}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
  #inv{position:absolute;top:8px;left:8px;display:flex;gap:5px;z-index:5;flex-wrap:wrap;max-width:62%}
  .chip{background:var(--paper);border:3px solid var(--ink);border-radius:999px;padding:3px 9px;
    font-size:clamp(10px,2.3vw,14px);font-weight:bold;display:flex;align-items:center;gap:4px;box-shadow:2px 3px 0 var(--ink)}
  #mute{position:absolute;top:8px;right:8px;z-index:8;background:var(--paper);border:3px solid var(--ink);
    border-radius:999px;width:40px;height:40px;font-size:18px;box-shadow:2px 3px 0 var(--ink);cursor:pointer}
  #dlg{position:absolute;left:3%;right:3%;bottom:3%;z-index:6;background:var(--paper);border:4px solid var(--ink);
    border-radius:16px;padding:12px 15px;box-shadow:4px 6px 0 var(--ink);cursor:pointer;display:none}
  #spk{font-weight:bold;font-size:clamp(12px,2.7vw,17px);margin-bottom:2px;color:#a8324f}
  #txt{font-size:clamp(14px,3.2vw,20px);line-height:1.25}
  #more{position:absolute;right:12px;bottom:6px;font-size:12px;opacity:.5}
  #choices{position:absolute;left:5%;right:5%;bottom:5%;z-index:7;display:none;flex-direction:column;gap:8px}
  .btn{background:var(--sun);border:4px solid var(--ink);border-radius:14px;padding:11px 14px;font-family:inherit;
    font-weight:bold;font-size:clamp(13px,3vw,18px);cursor:pointer;box-shadow:3px 4px 0 var(--ink);text-align:left}
  .btn:active{transform:translate(2px,3px);box-shadow:1px 1px 0 var(--ink)}
  #hint{position:absolute;left:50%;top:12px;transform:translateX(-50%);z-index:5;background:rgba(0,0,0,.55);
    color:#fff;padding:6px 14px;border-radius:999px;font-size:clamp(11px,2.4vw,15px);font-weight:bold;display:none;
    text-align:center;max-width:80%}
  #next{position:absolute;right:14px;bottom:14px;z-index:6;display:none;background:var(--coral);color:#fff;
    border:4px solid var(--ink);border-radius:999px;width:60px;height:60px;font-size:28px;cursor:pointer;
    box-shadow:3px 4px 0 var(--ink);align-items:center;justify-content:center;animation:bob 1s infinite}
  @keyframes bob{50%{transform:translateY(-5px)}}
  .center{display:flex !important}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="900" height="600"></canvas>
  <div id="inv"></div>
  <button id="mute" aria-label="mute">🔊</button>
  <div id="hint"></div>
  <div id="dlg"><div id="spk"></div><div id="txt"></div><div id="more">tap ▸</div></div>
  <div id="choices"></div>
  <button id="next" aria-label="next">➜</button>
</div>
<script>
"use strict";
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=900,H=600;
const dlg=document.getElementById('dlg'),spk=document.getElementById('spk'),txt=document.getElementById('txt');
const choicesEl=document.getElementById('choices'),hintEl=document.getElementById('hint'),nextBtn=document.getElementById('next'),invEl=document.getElementById('inv');
const wrap=document.getElementById('wrap'), muteBtn=document.getElementById('mute');

function fit(){ let w=Math.min(window.innerWidth,900), h=w*6/9;
  if(h>window.innerHeight){ h=window.innerHeight; w=h*9/6; } wrap.style.width=w+'px'; wrap.style.height=h+'px'; }
window.addEventListener('resize',fit); window.addEventListener('orientationchange',()=>setTimeout(fit,150)); fit();

let AC=null, muted=false;
function audioUnlock(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){AC=null;} }
  if(AC&&AC.state==='suspended') AC.resume(); }
function now(){ return AC?AC.currentTime:performance.now()/1000; }
function tone(freq,dur,type,vol,when){ if(!AC||muted)return; const t=when||AC.currentTime;
  const o=AC.createOscillator(),g=AC.createGain(); o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
  const v=vol==null?0.18:vol; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(v,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur+0.03); }
function melody(notes){ if(!AC||muted)return; let t=AC.currentTime; notes.forEach(n=>{tone(n[0],n[1],n[2]||'triangle',n[3],t); t+=n[1]*0.85;}); }
const SFX={
  collect(){tone(880,0.10,'triangle',0.18);tone(1320,0.10,'triangle',0.14,(AC?AC.currentTime+0.06:0));},
  good(){tone(660,0.09,'square',0.14);},
  perfect(){tone(990,0.10,'square',0.16);tone(1480,0.10,'square',0.12,(AC?AC.currentTime+0.05:0));},
  bad(){tone(150,0.18,'sawtooth',0.18);},
  flap(){tone(520,0.07,'sine',0.12);},
  win(){melody([[523,0.16],[659,0.16],[784,0.16],[1046,0.34]]);},
  start(){melody([[392,0.12],[523,0.12],[659,0.2]]);}
};
muteBtn.addEventListener('click',()=>{muted=!muted;muteBtn.textContent=muted?'🔇':'🔊';if(!muted&&AC)music.nextT=AC.currentTime+0.05;});

// ---------- background music (per-scene loops) ----------
const NOTE={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,B3:246.94,
  C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25,G5:783.99};
const N=NOTE;
const TRACKS={
  home:{spb:0.20,btype:'triangle',ltype:'sine',bvol:0.06,lvol:0.045,
    bass:[N.C3,0,N.G3,0, N.A3,0,N.E3,0, N.F3,0,N.C3,0, N.G3,0,N.G3,0],
    lead:[0,N.E4,0,N.G4, 0,N.C5,0,N.A4, 0,N.F4,0,N.A4, 0,N.G4,0,N.B4]},
  snake:{spb:0.16,btype:'triangle',ltype:'square',bvol:0.06,lvol:0.04,
    bass:[N.A3,0,N.A3,N.E3, 0,N.A3,0,N.G3, N.A3,0,N.A3,N.E3, 0,N.F3,0,N.E3],
    lead:[0,0,N.E4,0, N.A4,0,N.C5,0, 0,0,N.E4,0, N.G4,0,N.A4,0]},
  cornfield:{spb:0.18,btype:'triangle',ltype:'triangle',bvol:0.06,lvol:0.045,
    bass:[N.C3,0,N.C3,0, N.G3,0,N.G3,0, N.A3,0,N.A3,0, N.F3,0,N.G3,0],
    lead:[N.G4,0,N.E4,0, N.G4,0,N.C5,0, N.A4,0,N.E4,0, N.F4,0,N.G4,0]},
  mountains:{spb:0.13,btype:'triangle',ltype:'sine',bvol:0.055,lvol:0.04,
    bass:[N.D3,0,0,N.A3, 0,0,N.D3,0, 0,N.A3,0,0, N.D3,0,N.A3,0],
    lead:[N.D4,N.F4,N.A4,N.D5, N.A4,N.F4,N.D4,N.F4, N.C4,N.E4,N.G4,N.C5, N.G4,N.E4,N.C4,N.E4]},
  lake:{spb:0.26,btype:'sine',ltype:'sine',bvol:0.06,lvol:0.04,
    bass:[N.D3,0,0,0, 0,0,N.A3,0, N.F3,0,0,0, 0,0,N.C3,0],
    lead:[0,0,N.A4,0, 0,N.D5,0,0, 0,0,N.F4,0, 0,N.A4,0,0]},
  mila:{spb:0.19,btype:'triangle',ltype:'sine',bvol:0.055,lvol:0.045,
    bass:[N.F3,0,N.C3,0, N.G3,0,N.C3,0, N.A3,0,N.E3,0, N.F3,0,N.G3,0],
    lead:[0,N.A4,0,N.C5, 0,N.E5,0,N.C5, 0,N.A4,0,N.E5, 0,N.C5,0,N.A4]},
  ratqueso:{spb:0.15,btype:'triangle',ltype:'square',bvol:0.06,lvol:0.04,
    bass:[N.C3,0,N.G3,0, N.C3,0,N.G3,0, N.F3,0,N.C3,0, N.G3,0,N.G3,0],
    lead:[N.E4,0,N.G4,0, N.C5,0,N.G4,0, N.F4,0,N.A4,0, N.G4,0,N.E4,0]},
  literature:{spb:0.24,btype:'sine',ltype:'sine',bvol:0.055,lvol:0.04,
    bass:[N.A3,0,N.E3,0, N.F3,0,N.C3,0, N.G3,0,N.D3,0, N.A3,0,N.E3,0],
    lead:[0,0,N.A4,0, 0,0,N.E4,0, 0,0,N.C4,0, 0,0,N.D4,0]},
  cookie:{spb:0.17,btype:'square',ltype:'square',bvol:0.05,lvol:0.038,
    bass:[N.C3,0,N.C3,N.C3, 0,N.G3,0,0, N.C3,0,N.C3,N.C3, 0,N.F3,0,N.G3],
    lead:[0,N.C4,0,N.E4, 0,N.G4,0,0, 0,N.C4,0,N.E4, 0,N.F4,0,0]},
  kitchen:{spb:0.18,btype:'triangle',ltype:'sine',bvol:0.06,lvol:0.045,
    bass:[N.C3,0,N.G3,0, N.A3,0,N.E3,0, N.F3,0,N.C3,0, N.G3,0,N.G3,0],
    lead:[0,N.E4,0,N.G4, 0,N.A4,0,N.E4, 0,N.F4,0,N.A4, 0,N.G4,0,N.C5]},
  end:{spb:0.16,btype:'triangle',ltype:'square',bvol:0.06,lvol:0.05,
    bass:[N.C3,0,N.G3,0, N.C3,0,N.G3,0, N.F3,0,N.C3,0, N.G3,0,N.G3,0],
    lead:[N.C5,N.E5,N.G5,N.E5, N.C5,N.E5,N.G5,0, N.A4,N.C5,N.E5,N.C5, N.G4,N.B4,N.D5,N.G5]}
};
const music={track:TRACKS.home, step:0, nextT:0};
function setMusic(name){ music.track=TRACKS[name]||null; music.step=0; if(AC)music.nextT=AC.currentTime+0.05; }
function musicTick(){ if(!AC||muted||!music.track)return;
  if(music.nextT<AC.currentTime) music.nextT=AC.currentTime+0.05;
  const tr=music.track;
  while(music.nextT<AC.currentTime+0.2){ const s=music.step%16;
    if(tr.bass[s]) tone(tr.bass[s], tr.spb*0.95, tr.btype, tr.bvol, music.nextT);
    if(tr.lead[s]) tone(tr.lead[s], tr.spb*0.8, tr.ltype, tr.lvol, music.nextT);
    music.nextT+=tr.spb; music.step++; } }
setInterval(musicTick,40);

const G={scene:'home', inv:[], flags:{}, t:0, hotspots:[], queue:[], onDone:null, mini:null, ptr:{x:450,y:300}, down:false};
const ITEMS={maiz:'🌽',salt:'🧂',queso:'🧀',mantequilla:'🧈',cookie:'🍪',lemonada:'🥥'};
function has(i){return G.inv.includes(i)}
function give(i){ if(!has(i)){G.inv.push(i);renderInv();} }
function renderInv(){ invEl.innerHTML=''; G.inv.forEach(i=>{const d=document.createElement('div');d.className='chip';d.textContent=ITEMS[i]+' '+i;invEl.appendChild(d);}); }

function say(lines,done){ G.queue=lines.slice(); G.onDone=done||null; hideChoices(); nextLine(); }
function nextLine(){ if(!G.queue.length){ dlg.style.display='none'; const f=G.onDone; G.onDone=null; if(f)f(); return; }
  const a=G.queue.shift(); spk.textContent=a[0]; txt.textContent=a[1]; dlg.style.display='block'; }
function dialogVisible(){ return dlg.style.display==='block'; }
dlg.addEventListener('pointerdown',e=>{e.preventDefault();audioUnlock();if(dialogVisible())nextLine();});
function choices(opts){ choicesEl.innerHTML=''; opts.forEach(o=>{const b=document.createElement('button');b.className='btn';b.textContent=o.label;
  b.addEventListener('pointerdown',e=>{e.preventDefault();audioUnlock();SFX.good();hideChoices();o.fn();}); choicesEl.appendChild(b);}); choicesEl.classList.add('center'); }
function hideChoices(){ choicesEl.classList.remove('center'); choicesEl.innerHTML=''; }
function hint(t){ if(t){hintEl.textContent=t;hintEl.style.display='block';} else hintEl.style.display='none'; }
function showNext(fn){ nextBtn.style.display='flex'; nextBtn.onpointerdown=e=>{e.preventDefault();audioUnlock();SFX.good();nextBtn.style.display='none';fn();}; }
function hideNext(){ nextBtn.style.display='none'; }
function setHotspots(a){ G.hotspots=a||[]; }

function pos(ev){ const r=cv.getBoundingClientRect(); return { x:(ev.clientX-r.left)/r.width*W, y:(ev.clientY-r.top)/r.height*H }; }
cv.addEventListener('pointerdown',ev=>{ ev.preventDefault(); audioUnlock(); G.down=true; const p=pos(ev); G.ptr=p;
  if(dialogVisible()){ nextLine(); return; }
  if(G.mini&&G.mini.down){ G.mini.down(p); return; }
  for(const h of G.hotspots){ if(p.x>=h.x&&p.x<=h.x+h.w&&p.y>=h.y&&p.y<=h.y+h.h){ SFX.good(); h.fn(); return; } }
},{passive:false});
cv.addEventListener('pointermove',ev=>{ const p=pos(ev); G.ptr=p; if(G.mini&&G.mini.move&&G.down)G.mini.move(p); },{passive:false});
cv.addEventListener('pointerup',ev=>{ ev.preventDefault(); G.down=false; if(G.mini&&G.mini.up)G.mini.up(pos(ev)); },{passive:false});
cv.addEventListener('pointercancel',()=>{G.down=false;});
cv.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function blob(cx,cy,rx,ry){ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,7);ctx.closePath();}
function circle(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.closePath();}
function fill(c){ctx.fillStyle=c;ctx.fill();}
function outline(w){ctx.lineWidth=w||5;ctx.strokeStyle='#241a16';ctx.lineJoin='round';ctx.stroke();}
function bg(top,bot){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,top);g.addColorStop(1,bot);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function ground(y,c){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(0,y);for(let x=0;x<=W;x+=60)ctx.quadraticCurveTo(x+30,y-12,x+60,y);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();}
function label(t,x,y,s,c){ctx.font='bold '+(s||20)+'px "Chalkboard SE","Comic Sans MS",sans-serif';ctx.textAlign='center';ctx.lineWidth=4;ctx.strokeStyle='rgba(0,0,0,.35)';ctx.strokeText(t,x,y);ctx.fillStyle=c||'#fff';ctx.fillText(t,x,y);ctx.textAlign='left';}
function sun(x,y){circle(x,y,38);fill('#ffd23f');ctx.strokeStyle='#ffb703';ctx.lineWidth=4;for(let a=0;a<6.28;a+=0.78){ctx.beginPath();ctx.moveTo(x+Math.cos(a)*44,y+Math.sin(a)*44);ctx.lineTo(x+Math.cos(a)*58,y+Math.sin(a)*58);ctx.stroke();}}
function cloud(x,y,s){ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.fillStyle='#fff';blob(0,0,34,20);ctx.fill();blob(-26,4,20,14);ctx.fill();blob(26,4,20,14);ctx.fill();ctx.restore();}

function drawCow(x,y,s,o){o=o||{};ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.translate(0,Math.sin(G.t/22)*3);
  ctx.fillStyle='#fffaf2';[-22,-8,8,22].forEach(lx=>{rr(lx-5,28,10,26,4);fill('#fffaf2');outline(4);});
  blob(0,10,46,34);fill('#fffaf2');outline(5);
  ctx.fillStyle='#3b2a22';blob(-20,2,12,9);ctx.fill();blob(18,18,10,8);ctx.fill();blob(8,-8,7,6);ctx.fill();
  blob(0,-26,30,26);fill('#fffaf2');outline(5);
  blob(-28,-34,11,7);fill('#fffaf2');outline(4);blob(28,-34,11,7);fill('#fffaf2');outline(4);
  blob(-20,-46,6,9);fill('#f4d58d');outline(3);blob(20,-46,6,9);fill('#f4d58d');outline(3);
  blob(0,-16,18,13);fill('#ffc2d1');outline(4);circle(-6,-16,2.5);fill('#7a4a55');circle(6,-16,2.5);fill('#7a4a55');
  circle(-11,-30,5);fill('#fff');circle(11,-30,5);fill('#fff');const ex=o.look?o.look*2:0;
  circle(-11+ex,-29,2.6);fill('#241a16');circle(11+ex,-29,2.6);fill('#241a16');ctx.restore();}
function drawSnake(x,y,s){ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  ctx.beginPath();ctx.moveTo(0,40);for(let i=0;i<=6;i++){const yy=40-i*14,xx=Math.sin(G.t/12+i)*16;ctx.lineTo(xx,yy);}
  ctx.lineWidth=20;ctx.strokeStyle='#9b5de5';ctx.lineCap='round';ctx.stroke();
  const hx=Math.sin(G.t/12+6)*16,hy=40-6*14-6;circle(hx,hy,15);fill('#9b5de5');outline(4);
  circle(hx-5,hy-3,3);fill('#fff');circle(hx+5,hy-3,3);fill('#fff');circle(hx-5,hy-3,1.5);fill('#241a16');circle(hx+5,hy-3,1.5);fill('#241a16');
  ctx.strokeStyle='#ff5d8f';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(hx,hy+10);ctx.lineTo(hx+Math.sin(G.t/10)*4,hy+18);ctx.stroke();ctx.restore();}
function drawCat(x,y,s,fly){ctx.save();ctx.translate(x,y);ctx.scale(s,s);if(fly)ctx.translate(0,Math.sin(G.t/8)*10);
  if(fly){const wf=Math.sin(G.t/5)*0.5+1;ctx.save();ctx.scale(wf,1);blob(-40,-6,16,22);fill('#fff');outline(3);ctx.restore();ctx.save();ctx.scale(wf,1);blob(40,-6,16,22);fill('#fff');outline(3);ctx.restore();}
  blob(0,4,30,24);fill('#ff9f1c');outline(5);ctx.strokeStyle='#e07000';ctx.lineWidth=3;for(let i=-1;i<2;i++){ctx.beginPath();ctx.moveTo(i*12,-12);ctx.lineTo(i*12,18);ctx.stroke();}
  blob(0,-22,22,20);fill('#ff9f1c');outline(5);
  ctx.beginPath();ctx.moveTo(-20,-36);ctx.lineTo(-8,-40);ctx.lineTo(-12,-24);ctx.closePath();fill('#ff9f1c');outline(3);
  ctx.beginPath();ctx.moveTo(20,-36);ctx.lineTo(8,-40);ctx.lineTo(12,-24);ctx.closePath();fill('#ff9f1c');outline(3);
  circle(-8,-24,4);fill('#fff');circle(8,-24,4);fill('#fff');circle(-8,-24,2);fill('#241a16');circle(8,-24,2);fill('#241a16');circle(0,-18,3);fill('#ff5d8f');ctx.restore();}
function drawRat(x,y,s){ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  ctx.strokeStyle='#b8b8b8';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(20,6);ctx.quadraticCurveTo(45,0,50,-18);ctx.stroke();
  blob(0,6,26,18);fill('#bfbfbf');outline(4);blob(-18,-6,14,13);fill('#bfbfbf');outline(4);
  circle(-26,-14,7);fill('#f5c6d6');outline(3);circle(-12,-16,7);fill('#f5c6d6');outline(3);
  circle(-20,-6,3);fill('#fff');circle(-20,-6,1.6);fill('#241a16');circle(-30,-4,2.5);fill('#ff5d8f');ctx.restore();}
function drawCookieCreature(x,y,s){ctx.save();ctx.translate(x,y);ctx.scale(s,s);const m=Math.abs(Math.sin(G.t/14))*10;
  ctx.fillStyle='#4aa9e0';for(let a=0;a<6.28;a+=0.5){circle(Math.cos(a)*52,Math.sin(a)*50,9);ctx.fill();}
  blob(0,0,52,50);fill('#4aa9e0');outline(6);circle(-16,-22,16);fill('#fff');circle(16,-22,16);fill('#fff');
  const w=Math.sin(G.t/30)*3;circle(-16+w,-22,7);fill('#241a16');circle(16+w,-22,7);fill('#241a16');
  ctx.beginPath();ctx.moveTo(-26,10);ctx.quadraticCurveTo(0,18+m,26,10);ctx.quadraticCurveTo(0,30+m,-26,10);fill('#2a1a14');ctx.restore();}

const Scenes={};
function go(name){ G.scene=name; setHotspots([]); G.mini=null; setMusic(name); SFX.start(); Scenes[name](true); }
function reset(){ G.inv=[];G.flags={};renderInv();go('home'); }

Scenes.home=function(first){hint(null);hideNext();G.mini=null;
  if(first)say([
    ['','♪ ...la vaca, la vaca... ♪ The radio hums an old tune.'],

function startFlight(){
  hint('TAP to flap — pass 6 gaps');
  const cow={y:300,vy:0}, GRAV=0.55, FLAP=-8.2; let passed=0, dead=0;
  const cols=[];
  function spawn(x){ const gapH=170; const gapY=120+Math.random()*(H-260-gapH); cols.push({x,gapY,gapH,scored:false}); }
  for(let i=0;i<4;i++) spawn(560+i*260);
  function hitFlight(){ if(!dead){dead=1;SFX.bad();} }
  G.mini={
    down(){ if(dead)return; cow.vy=FLAP; SFX.flap(); },
    update(){ if(dead){dead++; if(dead>40){startFlight();} return;}
      cow.vy+=GRAV; cow.y+=cow.vy;
      cols.forEach(c=>{ c.x-=3.6; if(!c.scored && c.x<200){ c.scored=true; passed++; SFX.collect(); } });
      while(cols.length && cols[0].x<-80){ cols.shift(); spawn(cols[cols.length-1].x+260); }
      if(cow.y<40||cow.y>H-40) hitFlight();
      cols.forEach(c=>{ if(c.x>140&&c.x<260){ if(cow.y<c.gapY||cow.y>c.gapY+c.gapH) hitFlight(); } });
      if(passed>=6){ G.mini=null;hint(null);G.flags.flew=true;SFX.win();
        say([['','Over the peaks! ¡Volaste, vaca!'],['Flying Cat','¡Eso es! Now... mi snack? *purr* ...later. ¡A bucear!']],()=>showNext(()=>go('lake'))); }
    },
    drawMini(){ cols.forEach(c=>{ ctx.fillStyle='#6c7b8b';
        ctx.beginPath();ctx.moveTo(c.x-40,0);ctx.lineTo(c.x+40,0);ctx.lineTo(c.x,c.gapY);ctx.closePath();ctx.fill();outline(4);
        ctx.beginPath();ctx.moveTo(c.x-40,H);ctx.lineTo(c.x+40,H);ctx.lineTo(c.x,c.gapY+c.gapH);ctx.closePath();ctx.fill();outline(4);
        ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(c.x-12,c.gapY);ctx.lineTo(c.x+12,c.gapY);ctx.lineTo(c.x,c.gapY-18);ctx.closePath();ctx.fill(); });
      ctx.save();ctx.translate(200,cow.y);ctx.rotate(Math.max(-0.4,Math.min(0.6,cow.vy/14)));drawCat(0,0,0.75,true);drawCow(0,-4,0.55,{look:1});ctx.restore();
      label('Gaps: '+passed+' / 6',450,90,24,'#fff');
      if(dead) label('¡Ay! again...',450,300,30,'#ff5d8f'); }
  };
}

function startDive(){
  hint('Drag to steer • collect 6 salt • dodge jellies');
  const cow={x:450,tx:450,y:160}, ents=[]; let collected=0, air=100, tmr=0;
  function spawn(){ const r=Math.random(); const x=80+Math.random()*740;
    if(r<0.5) ents.push({type:'salt',x,y:H+30,r:20,v:1.6+Math.random()});
    else if(r<0.8) ents.push({type:'jelly',x,y:H+30,r:24,v:1.4+Math.random()*1.2,ph:Math.random()*6});
    else ents.push({type:'bubble',x,y:H+30,r:14,v:1.8+Math.random()}); }
  G.mini={
    down(p){cow.tx=p.x;}, move(p){cow.tx=p.x;},
    update(){ tmr++; if(tmr%34===0)spawn();
      cow.x+=(cow.tx-cow.x)*0.18; cow.x=Math.max(60,Math.min(840,cow.x));
      air-=0.16; if(air<=0){ air=60; if(collected>0)collected--; SFX.bad(); }
      for(let i=ents.length-1;i>=0;i--){ const e=ents[i]; e.y-=e.v;
        if(e.type==='jelly') e.x+=Math.sin(tmr/20+e.ph)*0.8;
        if(e.y<-40){ents.splice(i,1);continue;}
        if(Math.hypot(e.x-cow.x,e.y-cow.y)<e.r+26){
          if(e.type==='salt'){collected++;SFX.collect();ents.splice(i,1);}
          else if(e.type==='bubble'){air=Math.min(100,air+22);SFX.good();ents.splice(i,1);}
          else {air=Math.max(0,air-26);SFX.bad();ents.splice(i,1);} } }
      if(collected>=6){ G.mini=null;hint(null);give('salt');G.flags.salt=true;SFX.win();
        say([['','You got SALT! 🧂'],['Flying Cat','¡Eso es bacano! Now... to Mila!']],()=>showNext(()=>go('mila'))); } },
    drawMini(){ ents.forEach(e=>{ ctx.save();ctx.translate(e.x,e.y);
        if(e.type==='salt'){ctx.rotate(Math.sin(tmr/20+e.x));ctx.beginPath();ctx.moveTo(0,-e.r);ctx.lineTo(e.r*.7,0);ctx.lineTo(0,e.r);ctx.lineTo(-e.r*.7,0);ctx.closePath();fill('#eafcff');outline(4);}
        else if(e.type==='bubble'){circle(0,0,e.r);ctx.fillStyle='rgba(255,255,255,.5)';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();}
        else {blob(0,0,e.r,e.r*0.8);fill('#ff7fb0');outline(4);ctx.strokeStyle='#ff7fb0';ctx.lineWidth=4;for(let k=-2;k<3;k++){ctx.beginPath();ctx.moveTo(k*8,e.r*0.6);ctx.quadraticCurveTo(k*8+Math.sin(tmr/10+k)*6,e.r*0.6+18,k*8,e.r*0.6+26);ctx.stroke();}}
        ctx.restore(); });
      drawCow(cow.x,cow.y,0.85,{look:0});
      ctx.fillStyle='rgba(0,0,0,.35)';rr(40,560,260,20,10);ctx.fill();
      ctx.fillStyle=air<30?'#ff5d8f':'#37d3ff';rr(40,560,260*air/100,20,10);ctx.fill();
      label('AIR',55,575,14,'#fff'); label('Salt: '+collected+' / 6',760,80,22,'#fff'); }
  };
}

function startRhythm(){
  audioUnlock(); music.track=null; hint('Tap the lane on the beat!');
  const laneX=[280,450,620], hitY=470, topY=90, travel=1.65, bpm=104, beat=60/bpm;
  const start=now()+1.4;
  const seq=[0,1,2,1,0,2,1,2,0,1,2,0,1,2,1,0];
  const notes=seq.map((lane,i)=>({lane,hit:start+i*beat,judged:false,res:''}));
  let combo=0,best=0,hits=0,last='',lastT=0,nextBeat=start;
  G.mini={
    down(p){ let lane=0,bd=1e9; laneX.forEach((x,i)=>{const d=Math.abs(p.x-x);if(d<bd){bd=d;lane=i;}});
      if(bd>110)return; const t=now();
      let cand=null,cd=1e9; for(const n of notes){ if(n.judged||n.lane!==lane)continue; const d=Math.abs(n.hit-t); if(d<cd){cd=d;cand=n;} }
      if(cand&&cd<0.22){ cand.judged=true; if(cd<0.08){cand.res='PERFECT';hits++;combo++;SFX.perfect();} else {cand.res='GOOD';hits++;combo++;SFX.good();} best=Math.max(best,combo); last=cand.res; lastT=t; }
      else { combo=0; SFX.bad(); last='MISS'; lastT=t; } },
    update(){ const t=now();
      while(nextBeat<t+0.12){ tone(120,0.12,'sine',0.22,nextBeat); tone(820,0.03,'square',0.05,nextBeat); nextBeat+=beat; }
      for(const n of notes){ if(!n.judged&&t>n.hit+0.22){ n.judged=true; n.res='MISS'; combo=0; last='MISS'; lastT=t; } }
      const end=notes[notes.length-1].hit+1.0;
      if(t>end){ const need=10;
        if(hits>=need){ G.mini=null;hint(null);G.flags.done=true;SFX.win();
          say([['','*sizzle* The arepas puff up — fat, golden, MUY gorditas.'],['Cow','¡Listo! ¡Qué chimba! Now... where is that cappuccino?']],()=>Scenes.end(true)); }
        else { hint(null); say([['','Hmm, the dough fell flat ('+hits+'/'+need+'). ¡Otra vez, parce!']],startRhythm); } } },
    drawMini(){ const t=now();
      laneX.forEach((x,i)=>{ ctx.fillStyle=i%2?'rgba(255,255,255,.10)':'rgba(255,255,255,.16)'; ctx.fillRect(x-80,0,160,H);
        ctx.strokeStyle='rgba(36,26,22,.5)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x-80,0);ctx.lineTo(x-80,H);ctx.stroke(); });
      laneX.forEach(x=>{ ctx.fillStyle='#3a3a3a';rr(x-60,hitY,120,18,8);ctx.fill();outline(4);ctx.fillStyle='#222';ctx.fillRect(x+60,hitY+4,46,8); });
      notes.forEach(n=>{ if(n.judged&&n.res!=='')return; const dt=n.hit-t; if(dt>travel||dt< -0.25)return;
        const prog=1-(dt/travel); const y=topY+prog*(hitY-topY); const x=laneX[n.lane];
        ctx.save();ctx.translate(x,y);ctx.rotate(t*3+n.lane);circle(0,0,24);fill('#f6e3b0');outline(5);circle(-6,-4,3);fill('#d8b878');ctx.restore(); });
      drawCow(110,470,1.0,{look:0});
      label('Good flips: '+hits,450,60,22,'#7a4a00');
      label('Combo '+combo+(best?'  (best '+best+')':''),450,560,18,'#fff');
      if(last&&t-lastT<0.5){ const c=last==='PERFECT'?'#37d3ff':last==='GOOD'?'#3fa34d':'#ff5d8f'; label(last,450,250,40,c); } }
  };
}

  ],()=>{setHotspots([{x:0,y:0,w:W,h:H,fn:reset}]);hint('Tap anywhere to play again');});
};
Scenes.end.draw=function(){bg('#ffd23f','#ff9f1c');for(let i=0;i<40;i++){const cx=(i*53+G.t*2)%W,cy=(i*91+G.t*3)%H;ctx.fillStyle=['#ff5d8f','#16a6c9','#3fa34d','#9b5de5','#fff'][i%5];ctx.fillRect(cx,cy,6,10);}
  drawCow(450,360,1.6,{look:0});circle(450,200,46);fill('#f6e3b0');outline(6);circle(440,190,5);fill('#d8b878');circle(465,205,4);fill('#d8b878');label('¡Arepas Muy Gorditas!',450,470,30,'#7a2d00');};

function loop(){ G.t++; ctx.clearRect(0,0,W,H); const sc=Scenes[G.scene]; if(sc&&sc.draw)sc.draw(); if(G.mini&&G.mini.update)G.mini.update(); requestAnimationFrame(loop); }
renderInv(); Scenes.home(true); loop();
